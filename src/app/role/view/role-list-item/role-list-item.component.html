<a class="list-group-item list-group-item-action d-flex justify-content-between"
    (mouseenter)="toggleEditButtonVisibility()" (mouseleave)="toggleEditButtonVisibility()">
    <div class="d-flex">
        <i class="bi bi-people-fill m-1"></i>
        {{role.name}}
    </div>

    <div class="">
        <a class="btn btn-outline-secondary m-1" [routerLink]="['/role', role.id]" *ngIf="showEditBtn"><i class="bi bi-pencil-fill"></i></a>
        <a class="btn btn-outline-danger m-1"><i class="bi bi-trash3"></i></a>
    </div>
</a>
